<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var k = "smriti-portfolio-theme";
          var t = localStorage.getItem(k);
          if (
            t === "dark" ||
            (t !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.setAttribute("data-theme", "dark");
          } else {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Smriti Mohapatra — Computing Science student, ML & full-stack projects, research, and leadership."
    />
    <title>Smriti Mohapatra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
